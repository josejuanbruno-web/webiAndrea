services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    # Sin depends_on hacia certbot a propósito: no garantiza que el certificado
    # exista (solo ordena arranques) y provocaba que `docker compose run web`
    # arrancara también certbot en bucle (incidente del rate limit de Let's
    # Encrypt en el primer despliegue). `up -d` arranca ambos igualmente.
    networks:
      - default
      - edge
    # Nginx recarga la config cada 6h para recoger el certificado renovado
    command: >
      sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:?define CERTBOT_EMAIL en .env}
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - ./deploy/certbot/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  certbot-conf:
  certbot-webroot:

networks:
  # Red compartida con el addon otp-service (crear una vez por servidor:
  #   docker network create edge
  # ). El nginx de este stack llega al contenedor "otp" a través de ella.
  edge:
    external: true
