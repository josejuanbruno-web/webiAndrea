server {
    listen 80;
    listen [::]:80;
    server_name iandrea.ai www.iandrea.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Emitiendo certificado, vuelve en un minuto.\n";
        add_header Content-Type text/plain;
    }
}
