server {
    listen 80;
    listen [::]:80;
    server_name iandrea.ai www.iandrea.ai;

    # Certbot usa este path para validar el dominio (HTTP-01 challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name iandrea.ai www.iandrea.ai;

    ssl_certificate     /etc/letsencrypt/live/iandrea.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iandrea.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback de SPA: cualquier ruta desconocida sirve index.html (react-router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
